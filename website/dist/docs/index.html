<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Docs — SELF Docs</title>
    <meta name="color-scheme" content="dark light" />
    <style>
:root {
  --bg: #0b0f17;
  --bg2: #0f1624;
  --card: rgba(255, 255, 255, 0.06);
  --card2: rgba(255, 255, 255, 0.08);
  --border: rgba(255, 255, 255, 0.12);
  --text: rgba(255, 255, 255, 0.92);
  --muted: rgba(255, 255, 255, 0.68);
  --subtle: rgba(255, 255, 255, 0.55);
  --accent: #7c5cff;
  --accent2: #37c6ff;
  --ok: #26d07c;
  --shadow: 0 18px 60px rgba(0, 0, 0, 0.35);
  --radius: 16px;
  --radius2: 22px;
  --mono: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace;
  --sans: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Arial, "Apple Color Emoji", "Segoe UI Emoji";
}

@media (prefers-color-scheme: light) {
  :root {
    --bg: #f7f8fc;
    --bg2: #eef1ff;
    --card: rgba(0, 0, 0, 0.04);
    --card2: rgba(0, 0, 0, 0.06);
    --border: rgba(0, 0, 0, 0.12);
    --text: rgba(0, 0, 0, 0.88);
    --muted: rgba(0, 0, 0, 0.62);
    --subtle: rgba(0, 0, 0, 0.52);
    --shadow: 0 18px 60px rgba(20, 28, 64, 0.12);
  }
}

* {
  box-sizing: border-box;
}

html,
body {
  height: 100%;
}

body {
  margin: 0;
  font-family: var(--sans);
  color: var(--text);
  background:
    radial-gradient(900px 500px at 15% 10%, rgba(124, 92, 255, 0.28), transparent 55%),
    radial-gradient(900px 520px at 85% 22%, rgba(55, 198, 255, 0.22), transparent 60%),
    linear-gradient(180deg, var(--bg), var(--bg2));
}

a {
  color: inherit;
  text-decoration: none;
}

.container {
  width: min(1120px, calc(100% - 40px));
  margin: 0 auto;
}

.header {
  position: sticky;
  top: 0;
  z-index: 10;
  backdrop-filter: blur(14px);
  background: color-mix(in srgb, var(--bg), transparent 18%);
  border-bottom: 1px solid var(--border);
}

.header-inner {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 16px;
  padding: 14px 0;
}

.brand {
  display: flex;
  align-items: baseline;
  gap: 10px;
  font-weight: 700;
}

.brand-mark {
  letter-spacing: -0.04em;
  font-size: 18px;
  padding: 7px 10px;
  border-radius: 12px;
  background: linear-gradient(135deg, rgba(124, 92, 255, 0.25), rgba(55, 198, 255, 0.18));
  border: 1px solid var(--border);
}

.brand-sub {
  font-size: 13px;
  color: var(--muted);
  font-weight: 600;
}

.nav {
  display: none;
  gap: 18px;
  color: var(--muted);
  font-weight: 600;
}

.nav a:hover {
  color: var(--text);
}

.header-cta {
  display: flex;
  gap: 10px;
}

.btn {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
  border-radius: 14px;
  padding: 10px 14px;
  font-weight: 700;
  border: 1px solid var(--border);
  background: var(--card);
}

.btn:hover {
  background: var(--card2);
}

.btn-primary {
  border-color: color-mix(in srgb, var(--accent), var(--border) 45%);
  background: linear-gradient(135deg, rgba(124, 92, 255, 0.9), rgba(55, 198, 255, 0.75));
  color: #0b0f17;
}

.btn-primary:hover {
  filter: brightness(1.05);
}

.btn-secondary {
  border-color: color-mix(in srgb, var(--accent2), var(--border) 55%);
  background: linear-gradient(135deg, rgba(55, 198, 255, 0.22), rgba(124, 92, 255, 0.12));
}

.btn-ghost {
  background: transparent;
}

.hero {
  padding: 66px 0 36px;
}

.hero-inner {
  display: grid;
  gap: 22px;
  grid-template-columns: 1fr;
  align-items: start;
}

.eyebrow {
  color: var(--muted);
  font-weight: 700;
  letter-spacing: 0.02em;
  margin: 0 0 10px;
}

h1 {
  margin: 0 0 12px;
  font-size: clamp(38px, 4.2vw, 56px);
  line-height: 1.05;
  letter-spacing: -0.04em;
}

.lead {
  margin: 0 0 18px;
  color: var(--muted);
  font-size: 17px;
  line-height: 1.55;
}

.hero-actions {
  display: flex;
  gap: 12px;
  flex-wrap: wrap;
  margin-bottom: 12px;
}

.fineprint {
  color: var(--subtle);
  font-size: 13px;
  line-height: 1.5;
  margin: 0;
}

.card {
  border: 1px solid var(--border);
  background: var(--card);
  border-radius: var(--radius2);
  padding: 18px;
  box-shadow: var(--shadow);
}

.hero-card .card h2 {
  margin: 0 0 10px;
  font-size: 16px;
}

.checklist {
  margin: 0;
  padding: 0;
  list-style: none;
  display: grid;
  gap: 10px;
  color: var(--muted);
}

.checklist li {
  display: flex;
  gap: 10px;
  align-items: flex-start;
}

.checklist li::before {
  content: "✓";
  color: var(--ok);
  font-weight: 900;
  margin-top: 1px;
}

.mini {
  margin-top: 14px;
  display: grid;
  gap: 10px;
  grid-template-columns: 1fr 1fr;
}

.mini-block {
  padding: 10px;
  border-radius: 14px;
  border: 1px solid var(--border);
  background: color-mix(in srgb, var(--card), transparent 10%);
}

.mini-k {
  display: block;
  font-size: 12px;
  color: var(--subtle);
  font-weight: 700;
}

.mini-v {
  display: block;
  font-size: 13px;
  color: var(--text);
  font-weight: 700;
  margin-top: 2px;
}

.section {
  padding: 48px 0;
}

.section-alt {
  background: color-mix(in srgb, var(--bg2), transparent 18%);
  border-top: 1px solid var(--border);
  border-bottom: 1px solid var(--border);
}

.section h2 {
  margin: 0 0 10px;
  font-size: 26px;
  letter-spacing: -0.02em;
}

.section-lead {
  margin: 0 0 18px;
  color: var(--muted);
  line-height: 1.6;
}

.grid3 {
  display: grid;
  gap: 14px;
  grid-template-columns: 1fr;
}

.grid2 {
  display: grid;
  gap: 14px;
  grid-template-columns: 1fr;
}

.panel {
  border: 1px solid var(--border);
  background: var(--card);
  border-radius: var(--radius);
  padding: 16px;
}

.panel h3 {
  margin: 0 0 8px;
  font-size: 16px;
}

.panel p {
  margin: 0;
  color: var(--muted);
  line-height: 1.55;
}

.callout {
  margin-top: 18px;
  border-radius: var(--radius2);
  padding: 18px;
  border: 1px solid var(--border);
  background: linear-gradient(135deg, rgba(124, 92, 255, 0.16), rgba(55, 198, 255, 0.10));
  display: flex;
  flex-direction: column;
  gap: 14px;
}

.callout-body h3 {
  margin: 0 0 6px;
  font-size: 18px;
}

.callout-body p {
  margin: 0;
  color: var(--muted);
  line-height: 1.55;
}

.callout-actions {
  display: flex;
  gap: 10px;
  flex-wrap: wrap;
}

.pricing-grid {
  display: grid;
  gap: 14px;
  grid-template-columns: 1fr;
  align-items: stretch;
}

.price-card {
  position: relative;
  border: 1px solid var(--border);
  background: var(--card);
  border-radius: var(--radius2);
  padding: 18px;
  box-shadow: var(--shadow);
}

.price-card.featured {
  border-color: color-mix(in srgb, var(--accent), var(--border) 40%);
  background: linear-gradient(180deg, color-mix(in srgb, var(--card), transparent 10%), rgba(124, 92, 255, 0.10));
}

.badge {
  position: absolute;
  right: 16px;
  top: 16px;
  font-size: 12px;
  font-weight: 800;
  padding: 6px 10px;
  border-radius: 999px;
  border: 1px solid var(--border);
  background: color-mix(in srgb, var(--card2), transparent 10%);
  color: var(--muted);
}

.price-top h3 {
  margin: 0 0 6px;
}

.price {
  margin: 0 0 6px;
  font-size: 36px;
  font-weight: 900;
  letter-spacing: -0.03em;
}

.price span {
  font-size: 14px;
  font-weight: 800;
  color: var(--muted);
  margin-left: 6px;
}

.muted {
  color: var(--muted);
}

.price-card ul {
  margin: 14px 0 16px;
  padding-left: 18px;
  color: var(--muted);
  line-height: 1.6;
}

.finebox {
  margin-top: 18px;
  border: 1px solid var(--border);
  border-radius: var(--radius2);
  padding: 16px;
  background: color-mix(in srgb, var(--card), transparent 10%);
}

.finebox h3 {
  margin: 0 0 10px;
  font-size: 16px;
}

.bullets {
  margin: 0;
  padding-left: 18px;
  color: var(--muted);
  line-height: 1.6;
}

.disclaimer {
  margin-top: 18px;
  border: 1px solid var(--border);
  border-radius: var(--radius2);
  padding: 14px 16px;
  background: color-mix(in srgb, var(--card), transparent 10%);
  color: var(--muted);
  line-height: 1.55;
}

.codeblock {
  border-radius: var(--radius2);
  border: 1px solid var(--border);
  background: color-mix(in srgb, var(--card), transparent 10%);
  padding: 14px;
  overflow: auto;
  margin: 12px 0 18px;
}

.codeblock code {
  font-family: var(--mono);
  font-size: 13px;
}

.faq {
  display: grid;
  gap: 10px;
}

details {
  border: 1px solid var(--border);
  border-radius: var(--radius);
  background: var(--card);
  padding: 12px 14px;
}

summary {
  cursor: pointer;
  font-weight: 800;
}

details p {
  margin: 10px 0 0;
  color: var(--muted);
  line-height: 1.55;
}

.request {
  display: grid;
  gap: 16px;
  grid-template-columns: 1fr;
  align-items: start;
}

.request-card .card h3 {
  margin: 0 0 8px;
}

.footer {
  padding: 26px 0;
}

.footer-inner {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 12px;
  border-top: 1px solid var(--border);
  padding-top: 18px;
}

.footer-right {
  display: flex;
  gap: 14px;
  color: var(--muted);
  font-weight: 700;
}

.footer-right a:hover {
  color: var(--text);
}

/* Docs pages */
.doc-layout {
  display: grid;
  gap: 14px;
  grid-template-columns: 1fr;
  align-items: start;
}

.doc {
  border: 1px solid var(--border);
  background: var(--card);
  border-radius: var(--radius2);
  padding: 18px;
  overflow-wrap: anywhere;
}

.doc .doc-body :is(h1, h2, h3, h4, h5, h6) {
  margin-top: 18px;
}

.doc .doc-body p {
  color: var(--muted);
  line-height: 1.65;
}

.doc .doc-body a {
  color: color-mix(in srgb, var(--accent2), var(--text) 30%);
  text-decoration: underline;
  text-underline-offset: 2px;
}

.doc .doc-body code {
  font-family: var(--mono);
  font-size: 0.95em;
  padding: 2px 6px;
  border-radius: 10px;
  border: 1px solid var(--border);
  background: color-mix(in srgb, var(--card2), transparent 10%);
}

.doc .doc-body pre {
  overflow: auto;
  border-radius: 16px;
  border: 1px solid var(--border);
  background: color-mix(in srgb, var(--card), transparent 10%);
  padding: 12px;
}

.doc .doc-body pre code {
  border: none;
  background: transparent;
  padding: 0;
}

.doc-nav {
  position: relative;
}

@media (min-width: 980px) {
  .doc-layout {
    grid-template-columns: 0.38fr 0.62fr;
  }
  .doc-nav {
    position: sticky;
    top: 84px;
    align-self: start;
  }
}

@media (min-width: 880px) {
  .nav {
    display: flex;
  }
  .hero-inner {
    grid-template-columns: 1.15fr 0.85fr;
  }
  .grid3 {
    grid-template-columns: repeat(3, 1fr);
  }
  .grid2 {
    grid-template-columns: repeat(2, 1fr);
  }
  .pricing-grid {
    grid-template-columns: 1fr 1fr;
  }
  .request {
    grid-template-columns: 1.2fr 0.8fr;
  }
  .callout {
    flex-direction: row;
    align-items: center;
    justify-content: space-between;
  }
}

    </style>
  </head>
  <body>
    <header class="header">
      <div class="container header-inner">
        <a class="brand" href="/" aria-label="SELF home">
          <span class="brand-mark" aria-hidden="true">SELF</span>
          <span class="brand-sub">Public Docs</span>
        </a>
        <div class="header-cta">
          <a class="btn btn-ghost" href="/docs/">Docs index</a>
          <a class="btn btn-primary" href="mailto:Kevin@governedbyself.com">Contact</a>
        </div>
      </div>
    </header>
    <main>
      <section class="section">
        <div class="container doc-layout">
          <aside class="doc-nav">
            <div class="panel">
              <h3>Docs</h3>
              <ul class="bullets">
<li><a href="/docs/executive-brief/">Executive Brief</a></li>
<li><a href="/docs/pricing/">Pricing</a></li>
<li><a href="/docs/buy-sell-agreement/">Commercial Licensing Agreement (Escrow)</a></li>
</ul>
            </div>
          </aside>
          <article class="doc">
            
<h1>SELF Public Docs</h1>
<p class="muted">Read the public-facing docs for pricing, licensing, and executive overview.</p>
<ul class="bullets">
<li><a href="/docs/executive-brief/">Executive Brief</a></li>
<li><a href="/docs/pricing/">Pricing</a></li>
<li><a href="/docs/buy-sell-agreement/">Commercial Licensing Agreement (Escrow)</a></li>
</ul>

          </article>
        </div>
      </section>
    </main>
  </body>
</html>
